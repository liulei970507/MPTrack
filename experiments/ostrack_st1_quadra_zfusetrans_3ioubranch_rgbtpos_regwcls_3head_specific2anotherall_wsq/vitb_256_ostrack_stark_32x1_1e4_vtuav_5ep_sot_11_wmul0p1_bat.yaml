DATA:
  SAMPLER_MODE: quadra # 仅有一个额外的动态模板
  MAX_SAMPLE_INTERVAL: [200]
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.449
  - 0.449
  - 0.449
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.226
  - 0.226
  - 0.226
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 4 # 0 是 初始模板 1是 动态多模态模板
  TRAIN:
    DATASETS_NAME:
      - UAV_RGBT_train
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 60000
  VAL:
    DATASETS_NAME:
    - UAV_RGBT_test
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 10000
MODEL:
  PRETRAIN_FILE: "/data/Share/Teacher/liulei/Code/pretrained_models/vitb_256_mae_32x4_ep300/OSTrack_ep0300.pth.tar"  # SOT datasets pretraining with the checkpoint of OSTrack
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_ostrack
    STRIDE: 16
    TBSI_LOC: [11]
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  TBSI_DROP_PATH: [0.0]  # Drop_path rate for TBSI layers
  SOT_PRETRAIN: True  # Use SOT datasets pretrained weight
  BATCH_SIZE: 24
  EPOCH: 5
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.000075
  LR_DROP_EPOCH: 3
  NUM_WORKER: 8
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 1
  WEIGHT_DECAY: 0.0001
  AMP: True
TEST:
  EPOCH: 4
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  UPDATE_INTERVALS:
      LASHER: [50]
      GTOT: [50]
      RGBT210: [50]
      RGBT234: [50]
      VTUAV: [50]
  UPDATE_THRESHOLD:
      # default
      LASHER: [0.7]
      GTOT: [0.7]
      RGBT210: [0.7]
      RGBT234: [0.7]
      VTUAV: [0.7]
